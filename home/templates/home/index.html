<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MASA</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Raleway:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #BFBFBF, #EBEBEB);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-family: 'Raleway', sans-serif;
            color: black;
            font-size: 3em;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2em;
            color: black;
            margin-bottom: 40px;
        }

        a.button {
            display: inline-block;
            padding: 15px 40px;
            background-color: #fff;
            color: #00072D;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-size: 1.1em;
            background-color:#9ABDDC;
        }

        a.button:hover {
            background-color: #357ABD;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to MASA</h1>
        <p>We help mid-market manufacturers simplify financial and operational decisions.</p>
        <a href="{% url 'user:index' %}" class="button">Get Started</a>
    </div>
</body>
</html>
